info:
  name: DELETE REQUEST
  type: http
  seq: 20
http:
  method: DELETE
  url: '{{host}}/api/v1/requests/{{request_id}}'
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 204 or 404
    test: |
      expect([204, 404]).to.include(res.getStatus());
