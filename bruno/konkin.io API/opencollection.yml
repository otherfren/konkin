opencollection: 1.0.0

info:
  name: konkin
auth:
  type: apikey
  apikey:
    key: X-API-Key
    value: "{{API_KEY}}"
    placement: header
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
