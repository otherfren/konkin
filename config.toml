config-version = 1

[server]
host = "127.0.0.1"
port = 7070
log-level = "info"
log-file = "./logs/konkin.log"
log-rotate-max-size-mb = 10

[database]
url = "jdbc:h2:./data/konkin;AUTO_SERVER=TRUE"
user = "sa"
password = "sa"
pool-size = 5

[web-ui]
enabled = true

[web-ui.password-protection]
enabled = false
# rotate keys by deleting the referenced file
password-file = "./secrets/web-ui.password"

[web-ui.template]
directory = "./src/main/resources/templates"

[web-ui.static]
directory = "./src/main/resources/static"
hosted-path = "/assets"

[web-ui.auto-reload]
enabled = true
assets-enabled = true

[rest-api]
enabled = true
# auto-generated when missing
secret-file = "./secrets/rest-api.secret"

[agents.primary]
enabled = true
bind = "127.0.0.1"
port = 9550
secret-file = "./secrets/agent-primary.secret"

[agents.secondary.agent-arthur]
enabled = true
bind = "127.0.0.1"
port = 9560
secret-file = "./secrets/agent-arthur.secret"

[agents.secondary.agent-merlin]
enabled = true
bind = "127.0.0.1"
port = 9561
secret-file = "./secrets/agent-merlin.secret"

[debug]
enabled = true
seed-fake-data = false

[telegram]
enabled = true
secret-file = "./secrets/telegram.secret"
api-base-url = "https://api.telegram.org"
auto-deny-timeout = "3m"

[coins.bitcoin]
enabled = true

[coins.litecoin]
enabled = false
#example values for future litecoin auth config

[coins.litecoin.auth]
web-ui = true
rest-api = true
telegram = false
mcp = "ltc-main"

[[coins.litecoin.auth.auto-accept]]
[coins.litecoin.auth.auto-accept.criteria]
type = "value-lt"
value = 1.25

[[coins.litecoin.auth.auto-deny]]
[coins.litecoin.auth.auto-deny.criteria]
type = "cumulated-value-gt"
value = 8.0
period = "48h"

[coins.monero]
enabled = true

[coins.monero.auth]
web-ui = false
rest-api = true
telegram = true
mcp = "xmr-main"
min-approvals-required = 2
veto-channels = ["telegram"]
mcp-auth-channels = ["agent-arthur", "agent-merlin"]

[[coins.monero.auth.auto-accept]]
[coins.monero.auth.auto-accept.criteria]
type = "value-lt"
value = 0.2

[[coins.monero.auth.auto-deny]]
[coins.monero.auth.auto-deny.criteria]
type = "cumulated-value-gt"
value = 10
period = "24h"

[coins.testdummycoin]
enabled = false

[coins.testdummycoin.auth]
web-ui = true
rest-api = true
telegram = true
mcp = "tdc-main"
mcp-auth-channels = ["agent-arthur"]
min-approvals-required = 1

[coins.bitcoin.secret-files]
# files are auto-generated on startup when missing
bitcoin-daemon-config-file = "./secrets/bitcoin-daemon.conf"
bitcoin-wallet-config-file = "./secrets/bitcoin-wallet.conf"

[coins.bitcoin.auth]
web-ui = true
rest-api = true
telegram = true
# MCP auth channel identifiers shown in Auth Definitions
mcp-auth-channels = ["agent-arthur", "agent-merlin"]
min-approvals-required = 2
veto-channels = ["telegram", "agent-merlin"]

