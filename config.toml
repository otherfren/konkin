config-version = 1

[server]
host = "127.0.0.1"
port = 7070
log-level = "info"
log-file = "./logs/konkin.log"
log-rotate-max-size-mb = 10

[database]
url = "jdbc:h2:./data/konkin;AUTO_SERVER=TRUE"
user = "sa"
password = "sa"
pool-size = 5

[auth_queue]
enabled = true

[auth_queue.password-protection]
enabled = true
# rotate keys by deleting the referenced file
password-file = "./secrets/auth_queue.password"

[landing]
enabled = true

[landing.password-protection]
enabled = true
# rotate keys by deleting the referenced file
password-file = "./secrets/landing.password"

[landing.template]
directory = "./src/main/resources/templates"
name = "landing.ftl"

[landing.static]
directory = "./src/main/resources/static"
hosted-path = "/assets"

[landing.auto-reload]
enabled = true
assets-enabled = true

[telegram]
enabled = true
secret-file = "./secrets/telegram.secret"
api-base-url = "https://api.telegram.org"
